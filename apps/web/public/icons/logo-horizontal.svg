<?xml version="1.0" encoding="UTF-8"?>
<!--
  ParentScript — horizontal lockup  768×192
  Mark on the left, wordmark on the right. Sentence-case ParentScript, accent underline
  is reserved for the "you have a check-in on thursday" empty state — never here.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 192" role="img" aria-label="ParentScript">
  <defs>
    <linearGradient id="psHL_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Mark plate -->
  <rect x="0" y="0" width="192" height="192" rx="36" fill="url(#psHL_bg)"/>
  <g fill="#FFFFFF" transform="translate(-220, 0) scale(0.75)">
    <rect x="356" y="244" width="118" height="540" rx="22"/>
    <path d="M474 244
             h132
             a196 196 0 0 1 0 392
             h-132
             v-108
             h128
             a82 82 0 0 0 0 -164
             h-128
             z"
          fill-rule="evenOdd"/>
  </g>

  <!-- Wordmark — sentence case, Inter 700, optical-kerning -->
  <text x="232" y="121"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="700" fill="#111827"
        letter-spacing="-1.5">ParentScript</text>
  <!-- Tagline: voice rule says copy is sentence-case and warm. -->
  <text x="232" y="158"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="20" font-weight="500" fill="#6B7280"
        letter-spacing="-0.2">Say the right thing at the right time.</text>
</svg>
