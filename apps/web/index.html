<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ──────────────────────────────────────────────────────── -->
    <!-- viewport-fit=cover fills the notch / Dynamic Island area;
         CSS then uses env(safe-area-inset-*) to keep content clear of it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Color & theme ─────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light" />
    <meta name="msapplication-TileColor" content="#6366f1" />

    <!-- ── SEO / description ─────────────────────────────────────────────── -->
    <meta
      name="description"
      content="ParentScript — Therapist-guided parenting skills. Say the right thing at the right time."
    />
    <link rel="canonical" href="https://parentscript.app/" />

    <!-- ── Open Graph (Facebook, LinkedIn, iMessage, Slack, Discord) ────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ParentScript" />
    <meta property="og:title" content="ParentScript — Therapist-guided parenting skills" />
    <meta
      property="og:description"
      content="Evidence-based parenting scripts your therapist can stand behind. Built on PCIT, BPT, CPS, Triple P, and Circle of Security."
    />
    <meta property="og:url" content="https://parentscript.app/" />
    <meta property="og:image" content="https://parentscript.app/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="ParentScript — by AMAZED Labs" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X card ──────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ParentScript — Therapist-guided parenting skills" />
    <meta
      name="twitter:description"
      content="Evidence-based parenting scripts your therapist can stand behind. PCIT, BPT, CPS, Triple P, Circle of Security."
    />
    <meta name="twitter:image" content="https://parentscript.app/icons/icon-512.png" />
    <meta name="twitter:image:alt" content="ParentScript — by AMAZED Labs" />

    <!-- ── Structured data (Organization) ────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ParentScript",
        "alternateName": "AMAZED Labs",
        "url": "https://parentscript.app/",
        "logo": "https://parentscript.app/icons/icon-512.png",
        "description": "Therapist-guided parenting skills. Evidence-based scripts your clinician can review with you.",
        "sameAs": []
      }
    </script>

    <!-- ── Prevent iOS auto-formatting ───────────────────────────────────── -->
    <!-- Stops iOS from turning phone numbers / addresses into tappable links -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

    <!-- ── iOS Web App (PWA) ─────────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      black-translucent: status bar overlays app content, so the app extends
      edge-to-edge behind the bar. We compensate with pt-safe-top in CSS.
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ParentScript" />
    <meta name="HandheldFriendly" content="true" />

    <!-- ── Apple touch icons ─────────────────────────────────────────────── -->
    <!-- iOS uses these for the home-screen icon. PNG is required (SVG ignored).
         Generate PNGs from public/icons/icon.svg at the sizes listed below.
         Largest size (180×180) is used for modern iPhones; 167×167 for iPad Pro. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120.png" />
    <!-- Fallback for very old devices -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- ── iOS splash screens (startup images) ───────────────────────────── -->
    <!-- These show while the PWA is loading after launch from the home screen.
         Generate the PNG files from public/icons/icon.svg at the exact pixel sizes.
         File naming: /icons/splash-{width}x{height}.png                       -->

    <!-- iPhone SE 2nd/3rd gen (750×1334 @2x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-750x1334.png"
    />

    <!-- iPhone 8 / X / XS / 11 Pro (1125×2436 @3x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1125x2436.png"
    />

    <!-- iPhone XR / 11 (828×1792 @2x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-828x1792.png"
    />

    <!-- iPhone 11 Pro Max / XS Max (1242×2688 @3x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1242x2688.png"
    />

    <!-- iPhone 12 / 13 / 14 (1170×2532 @3x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1170x2532.png"
    />

    <!-- iPhone 12 Pro Max / 13 Pro Max / 14 Plus (1284×2778 @3x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1284x2778.png"
    />

    <!-- iPhone 14 Pro (1179×2556 @3x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1179x2556.png"
    />

    <!-- iPhone 14 Pro Max / 15 Pro Max (1290×2796 @3x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1290x2796.png"
    />

    <!-- iPad mini 6 portrait (1488×2266 @2x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-1488x2266.png"
    />

    <!-- iPad Air 4/5 portrait (1640×2360 @2x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-1640x2360.png"
    />

    <!-- iPad Pro 11" portrait (1668×2388 @2x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-1668x2388.png"
    />

    <!-- iPad Pro 12.9" portrait (2048×2732 @2x) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-2048x2732.png"
    />

    <!-- ── Standard icons ─────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>ParentScript</title>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
